<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Makerlog.ai</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 500px;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    h1 {
      color: #fff;
      font-size: 32px;
      margin-bottom: 12px;
    }

    p {
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .status {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .features {
      text-align: left;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .features h3 {
      color: #fff;
      font-size: 18px;
      margin-bottom: 16px;
    }

    .features ul {
      list-style: none;
    }

    .features li {
      color: #94a3b8;
      padding: 8px 0;
      display: flex;
      align-items: center;
    }

    .features li::before {
      content: "✓";
      color: #22c55e;
      margin-right: 12px;
      font-weight: bold;
    }

    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>You're Offline</h1>
    <p>No worries! Your recordings are safe and will sync automatically when you reconnect.</p>

    <div class="status">
      <span class="status-dot"></span>
      <span>Checking connection...</span>
    </div>

    <div class="features">
      <h3>What Still Works:</h3>
      <ul>
        <li>Record voice notes</li>
        <li>View conversations</li>
        <li>Browse opportunities</li>
        <li>Check your quota</li>
      </ul>
    </div>

    <button onclick="window.location.reload()">Try Reconnecting</button>
  </div>

  <script>
    // Auto-refresh when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Update status indicator
    function updateStatus() {
      const statusEl = document.querySelector('.status span:last-child');
      const dotEl = document.querySelector('.status-dot');

      if (navigator.onLine) {
        statusEl.textContent = 'Connection restored! Reloading...';
        dotEl.style.background = '#22c55e';
      } else {
        statusEl.textContent = 'Waiting for connection...';
        dotEl.style.background = '#ef4444';
      }
    }

    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    // Check connection periodically
    setInterval(() => {
      fetch('/api/health', { method: 'HEAD' })
        .then(() => {
          if (navigator.onLine) {
            window.location.reload();
          }
        })
        .catch(() => {
          // Still offline
        });
    }, 5000);
  </script>
</body>
</html>
